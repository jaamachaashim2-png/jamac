<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>

    <style>
fieldset{

    width: 400px;
    margin: 50px auto;
   background-color: rgb(37, 35, 19);
    color: white;


}
body{
color: white;
    background-color:rgb(27, 27, 62);
}
button{
    color: white;
    background-color: black;
}






    </style>
</head>
<body>
    <fieldset>
<h1>Paper Submission Forms</h1>
<hr>
<form action="">
    <p>
<label for="Name:">Name:</label>
<input type="text" name="Name:" id="Name:" required placeholder="First Name">&nbsp;
<input type="text" name="Last Name:" id="Last Name:" required placeholder="Last Name:"><br>
    </p>
    <p>
<label for="Date:">Date:</label>
<input type="date" name="Date:" id="Date:" required ><br>
<p>
<label for="Student Email:">Student Email:</label>
<input type="email" name="Student Email:" id="Student Email:" required placeholder="jamac@example.com"><br>
</p>
<p>

<label for="Student ID:">Student ID:</label><br>
<input type="text" name="Student ID:" id="Student ID:" placeholder="Enter student Id" required>
</p>
<p>

    <label for="Paper Title:">Paper Title:</label>
    <input type="text" name="Paper Title:" id="Paper Title:" required >
</p>

<p>
<label for="Description:">Description:</label>
<input type="text" name="Description:" id="Description:" required>

</p>
<p>
<label for="Upload Files:">Upload Files:</label>
<input type="file" name="Upload Files:" id="Upload Files:" required>

</p>
<p>

    <button>Submit</button>
</p>

















</form>
















    </fieldset>





</body>
</html>
